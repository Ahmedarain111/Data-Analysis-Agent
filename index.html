<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analysis Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #212121;
            --bg-card: #2d2d2d;
            --bg-input: #383838;
            --accent: #4dabf7;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --border: #444444;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .msg-group {
            display: flex;
            flex-direction: column;
        }

        .msg-header {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .user-msg .msg-header {
            color: var(--accent);
            align-self: flex-end;
        }

        .msg-body {
            max-width: 80%;
            line-height: 1.6;
            font-size: 1rem;
        }

        .user-msg .msg-body {
            align-self: flex-end;
            text-align: right;
        }

        .input-deck {
            background-color: var(--bg-card);
            border-radius: 20px;
            padding: 12px 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .custom-upload {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-input);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .custom-upload:hover {
            background: #454545;
            border-color: var(--accent);
        }

        #file-input {
            display: none;
        }

        /* Styling for Markdown elements generated by the Agent */
        .msg-body h1,
        .msg-body h2,
        .msg-body h3 {
            color: var(--accent);
            margin-top: 15px;
            font-size: 1.2rem;
        }

        .msg-body strong {
            color: #fff;
            font-weight: 700;
        }

        .msg-body ul,
        .msg-body ol {
            padding-left: 20px;
            margin-bottom: 10px;
        }

        /* THE TABLE FIX - This is usually why tables look like text */
        .msg-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.9rem;
            background: var(--bg-input);
            border-radius: 8px;
            overflow: hidden;
        }

        .msg-body th {
            background-color: #444;
            color: var(--accent);
            padding: 10px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .msg-body td {
            padding: 8px 10px;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .msg-body code {
            background: #1a1a1a;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            color: #ff8787;
        }

        .query-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
            padding: 10px 0;
        }

        .send-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .loading-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.8rem;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--accent);
            color: white;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1.0);
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div id="chat-window">
            <div class="msg-group agent-msg">
                <div class="msg-header">AI</div>
                <div class="msg-body">Upload your dataset and ask me anything about it.</div>
            </div>
        </div>

        <div class="input-deck">
            <form id="agent-form">
                <div class="controls-row">
                    <label for="file-input" class="custom-upload">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        <span id="file-label">Upload</span>
                    </label>
                    <input type="file" id="file-input" accept=".csv, .xlsx">

                    <input type="text" id="user-query" class="query-input" placeholder="Enter your query..." required>

                    <button type="submit" class="send-btn" id="submit-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const form = document.getElementById('agent-form');
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');

        fileInput.onchange = () => {
            if (fileInput.files.length > 0) {
                fileLabel.innerText = fileInput.files[0].name.substring(0, 10) + "...";
                fileLabel.parentElement.style.borderColor = "var(--accent)";
            }
        };

        function addMessage(role, text) {
            const group = document.createElement('div');
            group.className = `msg-group ${role}-msg`;

            const htmlContent = marked.parse(text);

            group.innerHTML = `
        <div class="msg-header">${role === 'user' ? 'You' : 'Assistant'}</div>
        <div class="msg-body">${htmlContent}</div>
    `;
            chatWindow.appendChild(group);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const queryInput = document.getElementById('user-query');
            const query = queryInput.value;
            if (!fileInput.files[0]) return alert("Please upload a file first.");

            addMessage('user', query);
            queryInput.value = '';

            const loadId = 'load-' + Date.now();
            addMessage('agent', `<div class="loading-dots" id="${loadId}"><span></span><span></span><span></span></div>`);

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('query', query);

            try {
                const response = await fetch('/query', { method: 'POST', body: formData });
                const data = await response.json();


                console.log("Data received from server:", data);

                const loadingDots = document.getElementById(loadId);
                const bodyContainer = loadingDots.parentElement;


                bodyContainer.innerHTML = marked.parse(data.response);

                if (data.filename) {
                    const btn = document.createElement('a');
                    btn.href = `/download/${data.filename}`;
                    btn.className = 'download-btn';
                    btn.style.display = 'inline-flex';
                    btn.style.marginTop = '15px';
                    btn.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg> Download Result`;

                    bodyContainer.appendChild(btn);
                } else {
                    console.error("No filename found in server response!");
                }

                chatWindow.scrollTop = chatWindow.scrollHeight;

            } catch (err) {
                console.error("Frontend Error:", err);
                document.getElementById(loadId).parentElement.innerHTML = '<span style="color: #ff8787;">Error. Check Console (F12).</span>';
            }
        });

    </script>

</body>

</html>
